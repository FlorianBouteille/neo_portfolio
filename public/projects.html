<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Bungee+Shade&family=Doto:wght@100..900&family=Electrolize&family=Jaro:opsz@6..72&family=Kedebideri:wght@400;500;600;700;800;900&family=Monofett&family=New+Amsterdam&family=Silkscreen:wght@400;700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/style.css" />
    <title>Mes Projets</title>
  </head>
  <body class="home">
    <header>
      <h1 class="silkscreen-bold"><a href="/">Mon Portfolio</a></h1>
    </header>
    <main>
      <div id="physics-container">
        <h2 class="silkscreen-regular">Mes Projets</h2>
        <div class="projectsLegend electrolize-regular" aria-label="Légende des types de projet">
          <div class="legendItem"><span class="legendDot projectType42" aria-hidden="true"></span><span>42</span></div>
          <div class="legendItem"><span class="legendDot projectTypeGraphic" aria-hidden="true"></span><span>Graphic</span></div>
          <div class="legendItem"><span class="legendDot projectTypeGame" aria-hidden="true"></span><span>Game</span></div>
          <div class="legendItem"><span class="legendDot projectTypeOther" aria-hidden="true"></span><span>Other</span></div>
        </div>
        <ul class="projectsWrapper" id="projects-wrapper"></ul>
      </div>
    </main>
    <footer>
      <h2 class="silkscreen-regular">Thanks for visiting !</h2>
    </footer>
    <script src="/js/projectsData.js"></script>
    <script src="/js/matter.min.js"></script>
    <script src="/js/projectsPhysics.js"></script>
  </body>
</html>
